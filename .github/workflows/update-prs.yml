import requests
import os

USERNAME = "zeel2104"
README_PATH = "README.md"
GITHUB_API = "https://api.github.com/search/issues"

# Query for merged PRs
query = f"author:{USERNAME} is:pr is:merged"

headers = {
    "Authorization": f"token {os.environ['GITHUB_TOKEN']}"
}

response = requests.get(GITHUB_API, headers=headers, params={"q": query, "per_page": 10})
data = response.json()

pr_lines = []
for item in data.get("items", []):
    repo_name = item["repository_url"].split("/")[-1]
    pr_number = item["number"]
    title = item["title"]
    url = item["html_url"]
    pr_lines.append(f"- 🟦 **{repo_name}** — PR #{pr_number}: [{title}]({url})")

# Read README
with open(README_PATH, "r", encoding="utf-8") as f:
    content = f.read()

# Replace the placeholder
start_tag = "<!-- START OPEN SOURCE LIST -->"
end_tag = "<!-- END OPEN SOURCE LIST -->"
new_section = start_tag + "\n" + "\n".join(pr_lines) + "\n" + end_tag
content = content.split(start_tag)[0] + new_section + content.split(end_tag)[1]

# Write README
with open(README_PATH, "w", encoding="utf-8") as f:
    f.write(content)

print("README updated with merged PRs!")
