name: Update Open Source Contributions

on:
  schedule:
    - cron: '0 9 * * *' # Runs daily at 9:00 AM UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to commit and push changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main # Forces the runner to stay on main instead of a detached HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Update README with merged PRs
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python - <<'END'
          import os
          import re
          import requests

          token = os.getenv("PAT_TOKEN")
          headers = {"Authorization": f"token {token}"} if token else {}
          
          # Query to fetch your merged pull requests across open-source orgs
          query = "author:zeel2104 is:pr is:merged"
          url = "https://api.github.com/search/issues"
          
          response = requests.get(url, headers=headers, params={"q": query, "per_page": 100})
          if response.status_code != 200:
              print(f"❌ API Error: {response.status_code} - {response.text}")
              exit(1)

          data = response.json()
          pr_lines = []
          
          print(f"Total items found by API query: {len(data.get('items', []))}")

          for item in data.get("items", []):
              pr_title = item.get("title")
              pr_url = item.get("html_url")
              # Skip pulling items from your own profile configuration repository
              if "zeel2104/zeel2104" in pr_url:
                  continue
              repo_name = pr_url.split("https://github.com/")[1].split("/pull/")[0]
              pr_lines.append(f"- [{pr_title}]({pr_url}) in `{repo_name}`")

          # Determine block to insert or apply fallbacks if list is empty
          if pr_lines:
              content_to_insert = "\n" + "\n".join(pr_lines) + "\n"
              print(f"✅ Prepared {len(pr_lines)} open-source contributions.")
          else:
              content_to_insert = "\n- 🚀 Shipped code and production features across large-scale ecosystems (NVIDIA, vLLM, Microsoft).\n"
              print("⚠️ No unique PRs found matching the criteria. Using fallback content.")

          # Read and update the README file content
          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          pattern = r"()(.*?)()"
          
          if not re.search(pattern, readme, re.DOTALL):
              print("❌ Placeholder tags not found in README.md")
              exit(1)

          updated_readme = re.sub(pattern, f"\\1{content_to_insert}\\3", readme, flags=re.DOTALL)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated_readme)
              
          print("✅ README updated with merged PRs!")
          END

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff-index --quiet HEAD; then
            echo "No changes detected to push"
          else
            git commit -m "⚙️ Update open source contributions list [skip ci]"
            git push origin main
          fi
