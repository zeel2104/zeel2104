name: Update Open Source Contributions

on:
  schedule:
    - cron: '0 9 * * *' # Runs daily at 9:00 AM UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to commit and push changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main # Forces the runner to stay on main instead of a detached HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Update README with merged PRs
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python - <<'END'
          import os
          import requests

          token = os.getenv("PAT_TOKEN")
          headers = {"Authorization": f"token {token}"} if token else {}
          
          # Broadened query to track public PR configurations
          query = "author:zeel2104 is:pr"
          url = "https://api.github.com/search/issues"
          
          response = requests.get(url, headers=headers, params={"q": query, "per_page": 100})
          if response.status_code != 200:
              print(f"❌ API Error: {response.status_code}")
              exit(1)

          data = response.json()
          pr_lines = []
          
          for item in data.get("items", []):
              if "pull_request" in item and item.get("state") == "closed":
                  pr_title = item.get("title")
                  pr_url = item.get("html_url")
                  if "zeel2104/zeel2104" in pr_url:
                      continue
                  repo_name = pr_url.split("https://github.com/")[1].split("/pull/")[0]
                  pr_lines.append(f"- [{pr_title}]({pr_url}) in `{repo_name}`")

          # Explicit fallback blocks tracking your framework features if API returns empty
          if pr_lines:
              content_to_insert = "\n" + "\n".join(list(set(pr_lines))[:15]) + "\n"
          else:
              content_to_insert = (
                  "\n"
                  "- 🚀 Shipped code and production features for **NVIDIA NeMo** (enabled Gemma 4 family configuration pipelines on MLX backend frameworks)\n"
                  "- ⚙️ Built real-time GNSS signal analytics infrastructure monitoring satellite jamming over 1,000+ framework arrays\n"
                  "- 🛠️ Merged production logic fixes and model hybrid-cache execution handling across core AI open-source frameworks (vLLM, Microsoft repositories)\n"
              )

          with open("README.md", "r", encoding="utf-8") as f:
              lines = f.readlines()

          new_lines = []
          inside_block = False
          start_found = False
          end_found = False

          for line in lines:
              if "" in line:
                  inside_block = True
                  start_found = True
                  new_lines.append(line)
                  new_lines.append(content_to_insert)
                  continue
              if "" in line:
                  inside_block = False
                  end_found = True
                  new_lines.append(line)
                  continue
              if not inside_block:
                  new_lines.append(line)

          if not start_found or not end_found:
              print("❌ Placeholder tags not found in README.md")
              exit(1)

          with open("README.md", "w", encoding="utf-8") as f:
              f.writelines(new_lines)
              
          print("✅ README forced update complete!")
          END

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff-index --quiet HEAD; then
            echo "No changes detected to push"
          else
            git commit -m "⚙️ Update open source contributions list [skip ci]"
            git push origin main
          fi
