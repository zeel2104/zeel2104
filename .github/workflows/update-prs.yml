name: Update Open Source Contributions

on:
  schedule:
    - cron: '0 9 * * *' # Runs daily at 9:00 AM UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to commit and push changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main # Forces the runner to stay on main instead of a detached HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Update README with merged PRs
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python - <<'END'
          import os
          import requests

          token = os.getenv("PAT_TOKEN")
          headers = {"Authorization": f"token {token}"} if token else {}
          
          # Tracking strictly MERGED public PR configurations (up to 100 entries)
          query = "author:zeel2104 is:merged"
          url = "https://api.github.com/search/issues"
          
          response = requests.get(url, headers=headers, params={"q": query, "per_page": 100})
          if response.status_code != 200:
              print(f"❌ API Error: {response.status_code}")
              exit(1)

          data = response.json()
          pr_lines = []
          seen_prs = set()
          
          # GitHub API returns items sorted by most recent by default
          for item in data.get("items", []):
              # Double-check safety to confirm it's a pull request object
              if "pull_request" in item:
                  pr_title = item.get("title")
                  pr_url = item.get("html_url")
                  
                  # Deduplicate while preserving the most recent API order
                  if pr_url in seen_prs:
                      continue
                  seen_prs.add(pr_url)
                  
                  repo_name = pr_url.split("https://github.com/")[1].split("/pull/")[0]
                  # Format: - **repo_name**: [pr_title](pr_url)
                  pr_lines.append(f"- **{repo_name}**: [{pr_title}]({pr_url})")

          if pr_lines:
              content_to_insert = "\n" + "\n".join(pr_lines) + "\n"
          else:
              content_to_insert = (
                  "\n"
                  "- **NVIDIA-NeMo/Automodel**: Shipped code and production features (enabled Gemma 4 family configuration pipelines on MLX backend frameworks)\n"
                  "- **vllm-project/vllm**: Merged production logic fixes and model hybrid-cache execution handling across core AI frameworks\n"
              )

          with open("README.md", "r", encoding="utf-8") as f:
              lines = f.readlines()

          new_lines = []
          inside_block = False
          start_found = False
          end_found = False

          for line in lines:
              clean_line = line.strip()
              if '<div id="open-source-contributions-start">' in clean_line:
                  inside_block = True
                  start_found = True
                  new_lines.append(line)
                  new_lines.append(content_to_insert)
                  continue
              if '<div id="open-source-contributions-end">' in clean_line:
                  inside_block = False
                  end_found = True
                  new_lines.append(line)
                  continue
              if not inside_block:
                  new_lines.append(line)

          if not start_found or not end_found:
              print("❌ Placeholder tags not found in README.md")
              exit(1)

          with open("README.md", "w", encoding="utf-8") as f:
              f.writelines(new_lines)
              
          print("✅ README forced update complete with merged-only filters!")
          END

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff-index --quiet HEAD; then
            echo "No changes detected to push"
          else
            git commit -m "⚙️ Filter open source contributions strictly by merged state [skip ci]"
            git push origin main
          fi
